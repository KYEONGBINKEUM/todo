name: Firebase Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/out/**'
      - 'functions/src/**'
      - 'functions/package.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Firebase Functions
        run: |
          cd functions
          npm ci
          npm run build

      - name: Deploy to Firebase (hosting + functions)
        run: npx firebase-tools deploy --only "hosting,functions" --token "${{ secrets.FIREBASE_TOKEN }}" --project ai-todo-e213a --non-interactive
